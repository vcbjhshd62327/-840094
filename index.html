<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المصحف الذهبي</title>

<style>
body{
margin:0;
font-family:Tahoma;
direction:rtl;
background:#f5f5f5;
transition:0.3s;
}

/* Dark Mode */
body.dark{
background:#0f0f0f;
color:white;
}

/* الهيدر */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:gold;
color:black;
font-weight:bold;
}

/* أزرار */
.btn{
background:black;
color:gold;
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
}

/* القائمة */
.menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#111;
color:white;
overflow:auto;
transition:0.3s;
z-index:999;
}
.menu.open{left:0;}
.menu div{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

/* المصحف (سكرول أفقي) */
.book{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
height:90vh;
}

/* الصفحة */
.page{
min-width:100%;
scroll-snap-align:center;
padding:20px;
box-sizing:border-box;
}

/* الإطار الذهبي */
.inner{
border:3px solid gold;
border-radius:20px;
padding:15px;
height:100%;
position:relative;
}

/* البسملة */
.bismillah{
text-align:center;
color:gold;
margin:10px 0;
}

/* الآيات */
.ayah{
font-size:20px;
line-height:2;
margin:8px 0;
}

/* رقم الصفحة */
.pageNum{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:gold;
color:black;
padding:5px 12px;
border-radius:50px;
}

</style>
</head>

<body>

<!-- القائمة -->
<div class="menu" id="menu"></div>

<!-- الهيدر -->
<div class="header">
<button class="btn" onclick="toggleMenu()">☰ السور</button>
<button class="btn" onclick="toggleMode()">🌙</button>
<button class="btn" onclick="search()">🔍</button>
</div>

<!-- المصحف -->
<div class="book" id="book"></div>

<script>

const API="https://api.alquran.cloud/v1/quran/ar";
const book=document.getElementById("book");
const menu=document.getElementById("menu");

let pages=[];

// تحميل القرآن
fetch(API)
.then(r=>r.json())
.then(data=>{

let surahs=data.data.surahs;

// القائمة
surahs.forEach((s,i)=>{
let d=document.createElement("div");
d.innerText=s.name;
d.onclick=()=>goToSurah(i);
menu.appendChild(d);
});

// صفحات (كل 10 آيات)
surahs.forEach(s=>{
for(let i=0;i<s.ayahs.length;i+=10){
pages.push({
surah:s.name,
ayahs:s.ayahs.slice(i,i+10)
});
}
});

render();

});

// رسم الصفحات (جنب بعض)
function render(){

book.innerHTML="";

pages.forEach((p,i)=>{

let page=document.createElement("div");
page.className="page";

page.innerHTML=`
<div class="inner">
<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>

${p.ayahs.map(a=>`<div class="ayah">${a.text}</div>`).join("")}

<div class="pageNum">${i+1}</div>
</div>
`;

book.appendChild(page);

});

}

// الذهاب لسورة (تصحيح مهم 🔥)
function goToSurah(index){

let target=index * 1; // بداية السورة (تقريب بسيط)

book.scrollTo({
left: target * window.innerWidth,
behavior:"smooth"
});

menu.classList.remove("open");

}

// القائمة
function toggleMenu(){
menu.classList.toggle("open");
}

// دارك مود
function toggleMode(){
document.body.classList.toggle("dark");
}

// بحث بسيط
function search(){
let w=prompt("ابحث داخل القرآن:");
if(!w) return;

let found=pages.findIndex(p=>
p.ayahs.some(a=>a.text.includes(w))
);

if(found!=-1){
book.scrollTo({
left: found * window.innerWidth,
behavior:"smooth"
});
}

}

</script>

</body>
</html>
